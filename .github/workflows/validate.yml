name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hassfest dependencies
        run: pip install homeassistant --quiet

      - name: Check Python syntax
        run: |
          python -m py_compile custom_components/naturela_smarthome/*.py
          echo "Syntax OK"

      - name: Validate manifest.json
        run: |
          python -c "
          import json, sys
          with open('custom_components/naturela_smarthome/manifest.json') as f:
              m = json.load(f)
          required = ['domain', 'name', 'version', 'config_flow', 'iot_class']
          missing = [k for k in required if k not in m]
          if missing:
              print('Missing keys:', missing)
              sys.exit(1)
          print('manifest.json OK')
          "
