# Naturela BurnerTouch - Example dashboard card for Home Assistant
#
# REQUIREMENT: Install the custom card first (see README.md step 4).
#
# Step 1 - Copy naturela-pellet-card.js to /config/www/
# Step 2 - Add as a Lovelace resource:
#          Settings -> Dashboards -> ... -> Resources -> +
#          URL: /local/naturela-pellet-card.js  Type: JavaScript module
# Step 3 - Reload the browser (Ctrl+F5 / Cmd+Shift+R)
# Step 4 - Paste the YAML below into your dashboard via the raw YAML editor
type: custom:naturela-pellet-card
title: Shed (Pellets)
climate_entity: climate.pellet_stove
status_sensor: sensor.pellet_stove_status
boiler_sensor: sensor.pellet_stove_boiler_temperature
flue_sensor: sensor.pellet_stove_flue_gas_temperature
power_sensor: sensor.pellet_stove_thermal_output
flame_sensor: sensor.pellet_stove_flame_level
alarm_sensor: sensor.pellet_stove_alarm
